# Unified training defaults (orchestrator + Trainer)
learning_rate: 3.0e-4
weight_decay: 1.0e-4
grad_clip: 1.0
phase1_epochs: 35
phase2_epochs: 35
phase3_epochs: 30
total_epochs: 100
sample_rate: 1000000
encoder_base_ch: 32
initial_sigma_recon: 1.0
initial_sigma_seg: 1.0
dice_weight: 1.0
charbonnier_eps: 0.001

# Data loader settings
n_train: 4000
n_val: 800
seed: 42
num_workers: 0
pin_memory: true

# Results
results_root: results
